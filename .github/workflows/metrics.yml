name: Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # 终端风格语言统计（带进度条）
  terminal-languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}

          # 输出文件名
          filename: assets/languages-terminal.svg

          # 用户配置
          user: icloudza

          # 使用终端模板 - 这是关键！
          template: terminal
          base: ""
          config_timezone: Asia/Shanghai

          # 语言统计插件
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 365

          # 代码行数统计
          plugin_lines: yes
          plugin_lines_sections: repositories
          plugin_lines_repositories_limit: 8

          # 提交作者识别
          commits_authoring: icloudza, icloudza@users.noreply.github.com

  # 经典风格语言统计（保留原有的）
  classic-languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: assets/languages.svg
          user: icloudza
          template: classic
          base: repositories
          config_timezone: Asia/Shanghai

          plugin_lines: yes
          plugin_lines_sections: repositories
          plugin_lines_repositories_limit: 8

          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_threshold: 0%
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 365

          commits_authoring: icloudza, icloudza@users.noreply.github.com
