name: Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # 终端风格语言统计（带进度条和行数）
  terminal-languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}

          # 输出文件名
          filename: assets/languages-terminal.svg

          # 用户配置
          user: icloudza

          # 使用终端模板
          template: terminal
          base: ""
          config_timezone: Asia/Shanghai

          # 语言统计插件 - 优化配置
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 10
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_limit: 10
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_recent_load: 1000
          plugin_languages_recent_days: 365
          # 排除 fork 仓库，只统计自己的代码
          repositories_forks: no

          # 代码行数统计
          plugin_lines: yes
          plugin_lines_sections: repositories
          plugin_lines_repositories_limit: 100
          plugin_lines_history_limit: 1

          # 提交作者识别 - 添加更多可能的邮箱
          commits_authoring: icloudza, icloudza@users.noreply.github.com, cloudza
