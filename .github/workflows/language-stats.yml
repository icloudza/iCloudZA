name: Language Stats

on:
  push:
    branches:
      - main
  schedule:
    # 每天 23:59 中国时间 (UTC+8) = UTC 15:59
    - cron: '59 15 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Language Stats Analysis
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: icloudza
          AUTHOR_EMAILS: icloudza,icloudza@users.noreply.github.com,cloudza
          OUTPUT_FILE: assets/languages-stats.md
          SINCE_DAYS: '7'
        run: python scripts/language_stats.py

      - name: Update README
        run: |
          # 更新本周语言统计
          STATS=$(cat assets/languages-stats.md)
          if grep -q "<!--LANG_STATS_START-->" README.md; then
            awk -v stats="$STATS" '
              /<!--LANG_STATS_START-->/ { print; print stats; skip=1; next }
              /<!--LANG_STATS_END-->/ { skip=0 }
              !skip { print }
            ' README.md > README.tmp && mv README.tmp README.md
          fi

          # 更新 commit 时间分布
          if [ -f assets/commit-stats.md ]; then
            COMMIT_STATS=$(cat assets/commit-stats.md)
            if grep -q "<!--COMMIT_STATS_START-->" README.md; then
              awk -v stats="$COMMIT_STATS" '
                /<!--COMMIT_STATS_START-->/ { print; print stats; skip=1; next }
                /<!--COMMIT_STATS_END-->/ { skip=0 }
                !skip { print }
              ' README.md > README.tmp && mv README.tmp README.md
            fi
          fi

          # 更新语言仓库分布
          if [ -f assets/repo-lang-stats.md ]; then
            REPO_LANG=$(cat assets/repo-lang-stats.md)
            if grep -q "<!--REPO_LANG_START-->" README.md; then
              awk -v stats="$REPO_LANG" '
                /<!--REPO_LANG_START-->/ { print; print stats; skip=1; next }
                /<!--REPO_LANG_END-->/ { skip=0 }
                !skip { print }
              ' README.md > README.tmp && mv README.tmp README.md
            fi
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "chore: 更新本周语言统计 [skip ci]"
          git push
